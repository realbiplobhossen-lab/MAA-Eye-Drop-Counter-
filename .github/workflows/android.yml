name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova Globally
        run: |
          npm cache clean --force
          npm install -g cordova@12.0.0

      - name: Create and Configure Cordova Project
        run: |
          # পুরোনো ফোল্ডার সম্পূর্ণ পরিষ্কার করা
          rm -rf android-app
          
          # নতুন কর্ডোভা প্রোজেক্ট ইনিশিয়েট করা
          cordova create android-app com.realbip.eyedroptracker "MAA_EyeDrop"
          cd android-app
          
          # ফ্রেশ নোড এনভায়রনমেন্ট
          npm install
          
          # মেইন সোর্স ফাইল কপি করা
          rm -rf www/*
          cp -r ../index.html www/
          
          # আইকন ট্যাগের জটিলতা সম্পূর্ণ দূর করার লজিক
          if [ -f ../mom_icon.png ]; then
            cp ../mom_icon.png www/
            cp ../config.xml ./
            echo "Custom icon found and applied successfully."
          else
            echo "Warning: mom_icon.png not found. Cleaning config.xml to avoid Cordova strict build crash."
            # config.xml থেকে আইকন রিলেটেড ট্যাগটি সম্পূর্ণ মুছে দিয়ে নতুন ফাইল তৈরি
            sed '/<icon/d' ../config.xml > ./config.xml
          fi

          # প্লাগইনসমূহ সংযোজন
          cordova plugin add cordova-plugin-vibration --save
          cordova plugin add cordova-plugin-local-notification --save
          cordova plugin add cordova-plugin-background-mode --save
          
          # এবার কোনো আইকন এরর ছাড়াই সফলভাবে প্ল্যাটফর্ম যুক্ত হবে
          cordova platform add android@12.0.0 --save

      - name: Build Android APK
        run: |
          cd android-app
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MAA-Eye-Drop-Counter-APK
          path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
