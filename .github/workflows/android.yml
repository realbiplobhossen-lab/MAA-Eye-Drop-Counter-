name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova Globally
        run: |
          npm cache clean --force
          npm install -g cordova@12.0.0

      - name: Create and Configure Cordova Project
        run: |
          # পুরোনো ফোল্ডার থাকলে তা সম্পূর্ণ মুছে ফেলা
          rm -rf android-app
          
          # নতুন কর্ডোভা প্রোজেক্ট তৈরি
          cordova create android-app com.realbip.eyedroptracker "MAA_EyeDrop"
          cd android-app
          
          # প্রোজেক্ট ডিরেক্টরিতে ফ্রেশ নোড এনভায়রনমেন্ট নিশ্চিত করা
          npm install
          
          # আপনার কাস্টম ফাইলসমূহ প্ল্যাটফর্ম যুক্ত করার আগেই কপি করা
          rm -rf www/*
          cp -r ../index.html www/
          cp -r ../config.xml ./
          
          # আইকন চেকিং লজিক
          if [ -f ../mom_icon.png ]; then
            cp ../mom_icon.png www/
            echo "Custom icon prepared."
          else
            echo "Warning: mom_icon.png not found."
          fi

          # সিকোয়েন্স ফিক্স: প্রথমে প্লাগইন যুক্ত করা, তারপর প্ল্যাটফর্ম অ্যাড করা
          cordova plugin add cordova-plugin-vibration --save
          cordova plugin add cordova-plugin-local-notification --save
          cordova plugin add cordova-plugin-background-mode --save
          
          # এবার সফলভাবে অ্যান্ড্রয়েড প্ল্যাটফর্ম যুক্ত হবে
          cordova platform add android@12.0.0 --save

      - name: Build Android APK
        run: |
          cd android-app
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MAA-Eye-Drop-Counter-APK
          path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
