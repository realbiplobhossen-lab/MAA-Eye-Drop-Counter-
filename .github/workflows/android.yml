name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # গ্র্যাডল সংস্করণ ৮.৭ লক করা
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      # প্রয়োজনীয় অ্যান্ড্রয়েড টুলস নিশ্চিত করা
      - name: Install Android Build Tools 33.0.2
        run: |
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses
          $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager "build-tools;33.0.2" "platforms;android-33"

      - name: Install Cordova Globally
        run: |
          npm cache clean --force
          npm install -g cordova@12.0.0

      - name: Create and Configure Cordova Project
        run: |
          rm -rf android-app
          cordova create android-app com.realbip.eyedroptracker "MAA_EyeDrop"
          cd android-app
          
          npm install
          rm -rf www/*
          cp -r ../index.html www/
          
          # আইকন ম্যানেজমেন্ট
          if [ -f ../mom_icon.png ]; then
            cp ../mom_icon.png www/
            cp ../config.xml ./
            echo "Custom icon applied."
          else
            echo "Warning: mom_icon.png not found. Cleaning config.xml."
            sed '/<icon/d' ../config.xml > ./config.xml
          fi

          # কোর প্লাগইনসমূহ সংযোজন
          cordova plugin add cordova-plugin-vibration --save
          cordova plugin add cordova-plugin-local-notification --save
          cordova plugin add cordova-plugin-background-mode --save
          
          # AndroidX মাইগ্রেশন এবং সাপোর্ট প্লাগইনসমূহ (জাভা কম্পাইল এরর ফিক্স করার জন্য)
          cordova plugin add cordova-plugin-androidx --save
          cordova plugin add cordova-plugin-androidx-adapter --save
          
          # প্ল্যাটফর্ম সংযোজন
          cordova platform add android@12.0.0 --save

          # পুরোনো প্লাগইনের ডিপেন্ডেন্সি প্যাচ
          echo "Targeted patching of legacy compile dependencies..."
          find platforms/android/ -name "*.gradle" -type f -exec sed -i 's/\bcompile\s\+/implementation /g' {} +

      - name: Build Android APK
        run: |
          cd android-app
          # এনভায়রনমেন্ট ভ্যারিয়েবলের মাধ্যমে AndroidX সক্রিয় করা এবং SDK কনফিগার করা
          export CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL="https://services.gradle.org/distributions/gradle-8.7-bin.zip"
          export CDV_COMPILE_SDK_VERSION=33
          export CDV_BUILD_TOOLS_VERSION="33.0.2"
          export CDV_ANDROIDX_ENABLED=true
          
          cordova build android --debug
          
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MAA-Eye-Drop-Counter-APK
          path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
