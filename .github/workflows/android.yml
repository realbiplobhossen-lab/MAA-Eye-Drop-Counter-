name: Build Android APK

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Cordova and Clean Cache
        run: |
          npm cache clean --force
          npm install -g cordova@12.0.0

      - name: Create Cordova Project
        run: |
          # পুরোনো অবশিষ্টাংশ থাকলে তা পরিষ্কার করা
          rm -rf android-app
          
          # নতুন কর্ডোভা অ্যাপ তৈরি
          cordova create android-app com.realbip.eyedroptracker "MAA_EyeDrop"
          cd android-app
          
          # নোড মডিউল পুনরায় ফ্রেশ ইনস্টল করা যাতে builders এরর না আসে
          npm install
          
          # প্ল্যাটফর্ম এবং প্লাগইনসমূহ সঠিক উপায়ে সংযোজন
          cordova platform add android@12.0.0 --nosave
          cordova plugin add cordova-plugin-vibration --nosave
          cordova plugin add cordova-plugin-local-notification --nosave
          cordova plugin add cordova-plugin-background-mode --nosave
          
          # আপনার কাস্টম ফাইলসমূহ কপি করা
          rm -rf www/*
          cp -r ../index.html www/
          cp -r ../config.xml ./
          
          # আইকন চেকিং (ছবি না থাকলে ডিফল্ট আইকন নিয়ে বিল্ড হবে, ক্র্যাশ করবে না)
          if [ -f ../mom_icon.png ]; then
            cp ../mom_icon.png www/
            echo "Custom icon applied successfully."
          else
            echo "Warning: mom_icon.png not found, using default icon."
          fi

      - name: Build Android APK
        run: |
          cd android-app
          cordova build android --debug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MAA-Eye-Drop-Counter-APK
          path: android-app/platforms/android/app/build/outputs/apk/debug/app-debug.apk
          
